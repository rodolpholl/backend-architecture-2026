# RabbitMQ Configuration
# Arquivo de configuração padrão do RabbitMQ (rabbitmq.conf)

# Network
listeners.tcp.default = 5672
management.tcp.port = 15672

# Memory
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

# Disk space
disk_free_limit.absolute = 500MB

# Clustering
cluster_partition_handling = autoheal

# Logging
log.file.level = info

# Management Plugin
management.load_definitions = /etc/rabbitmq/definitions.json

# Channel limits
channel_max = 2048
connection_max = 4096

# Heartbeat
heartbeat = 60

# Frame max (aumentado para suportar mensagens maiores)
frame_max = 131072

# Performance tuning
num_acceptors.tcp = 16

# TLS (desativado em dev, mas deixar como exemplo)
# listeners.ssl.default = 5671
# ssl_options.certfile = /etc/rabbitmq/certs/cert.pem
# ssl_options.keyfile = /etc/rabbitmq/certs/key.pem
